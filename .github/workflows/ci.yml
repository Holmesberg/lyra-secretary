name: CI

on:
  push:
    branches: [ main, 'wave-*', 'refactor/freeze-closure' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
        
    - name: Run tests
      run: pytest tests/
      env:
        PYTHONPATH: .

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXTAUTH_SECRET: "ci-only-nextauth-secret-min-32-chars"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      GOOGLE_CLIENT_ID: "ci-google-client-id"
      GOOGLE_CLIENT_SECRET: "ci-google-client-secret"

    steps:
    - uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci

    - name: Lint/typecheck frontend
      run: npm run lint

    - name: Build frontend
      run: npm run build

  topology-contract:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: "20"

    - name: Verify static topology contract
      run: node scripts/test_runtime_topology_contract.mjs

  s1c-static-gates:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: "pip"
        cache-dependency-path: backend/requirements.txt

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: "20"

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run authority surface gate
      run: python scripts/scan_authority_surfaces.py --fail-on-missing --fail-on-worker-write-drift

    - name: Run refactor contract gate
      run: |
        python -m py_compile scripts/scan_refactor_contracts.py
        python scripts/scan_refactor_contracts.py --self-test-jarvis-import-boundary
        python scripts/scan_refactor_contracts.py --self-test-no-rebrand
        python scripts/scan_refactor_contracts.py --self-test-removed-surface-docs
        python scripts/scan_refactor_contracts.py --self-test-legacy-notification-pending
        python scripts/scan_refactor_contracts.py --fail-on-errors

    - name: Run backend layer import gate
      run: |
        python -m py_compile scripts/scan_backend_layer_imports.py
        python scripts/scan_backend_layer_imports.py --self-test
        python scripts/scan_backend_layer_imports.py --fail-on-errors

    - name: Run Cortex read-only gate
      run: |
        python -m py_compile scripts/scan_cortex_readonly.py
        python scripts/scan_cortex_readonly.py --self-test
        python scripts/scan_cortex_readonly.py --fail-on-errors

    - name: Run shipped feature preservation registry gate
      run: |
        python -m py_compile scripts/scan_feature_preservation_registry.py
        python scripts/scan_feature_preservation_registry.py --self-test
        python scripts/scan_feature_preservation_registry.py --fail-on-errors

    - name: Run post-wave evidence manifest contract gate
      run: node scripts/test_post_wave_evidence_manifest_contract.mjs

    - name: Run browser account role contract gate
      run: node scripts/test_browser_account_role_contract.mjs

    - name: Run repository instructions contract gate
      run: node scripts/test_repository_instructions_contract.mjs

    - name: Run NewTaskModal fresh-default contract gate
      run: node scripts/test_new_task_modal_contract.mjs

    - name: Run onboarding Brain Dump recovery contract gate
      run: node scripts/test_onboarding_brain_dump_recovery_contract.mjs

    - name: Run onboarding skip durability contract gate
      run: node scripts/test_onboarding_skip_contract.mjs

    - name: Run product-loop account preflight contract gate
      run: node scripts/test_product_loop_account_preflight_contract.mjs

    - name: Run operator account preflight contract gate
      run: node scripts/test_operator_account_preflight_contract.mjs

    - name: Run Pressure Map planning provenance contract gate
      run: node scripts/test_pressure_map_planning_provenance_contract.mjs

    - name: Run undo invalidation contract gate
      run: node scripts/test_undo_invalidation_contract.mjs

    - name: Run frontend query-key contract gate
      run: node scripts/test_frontend_query_keys_contract.mjs

    - name: Run public runtime watchdog contract gate
      run: node scripts/test_public_runtime_watchdog_contract.mjs

    - name: Run public frontend restart contract gate
      run: node scripts/test_public_frontend_restart_contract.mjs

    - name: Run public backend isolation contract gate
      run: node scripts/test_public_backend_isolation_contract.mjs

    - name: Run OpenClaw operator relay hermetic test
      run: node scripts/test_openclaw_operator_relay.mjs

    - name: Run Alembic fresh database smoke
      shell: bash
      run: |
        set -euo pipefail
        tmp_db="$(mktemp "$RUNNER_TEMP/alembic-fresh-XXXXXX.sqlite")"
        rm -f "$tmp_db"
        export DATABASE_URL="sqlite:///$tmp_db"
        trap 'rm -f "$tmp_db"' EXIT
        cd backend
        PYTHONPATH=. python -m alembic upgrade head
        PYTHONPATH=. python -m alembic current
