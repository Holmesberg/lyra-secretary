<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Practice Problems</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --card: #1a1e2a;
    --border: #252836;
    --accent: #f7c948;
    --accent2: #5b8af5;
    --accent3: #e05c7a;
    --green: #4ecb8d;
    --text: #e8eaf0;
    --muted: #6b7280;
    --code-bg: #0a0c10;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,138,245,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,138,245,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeDown 0.7s ease both;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    width: 36px;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }
  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 400;
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    gap: 20px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .progress-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
    white-space: nowrap;
  }

  /* Topic filter tabs */
  .topic-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .topic-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .topic-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .topic-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* Problem cards */
  .problems-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .problem-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .problem-card:hover { border-color: #333a50; transform: translateY(-1px); }
  .problem-card.solved { border-color: rgba(78,203,141,0.3); }
  .problem-card.solved .card-header { background: rgba(78,203,141,0.04); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 22px 24px 18px;
    cursor: pointer;
    user-select: none;
  }

  .problem-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(247,201,72,0.1);
    border: 1px solid rgba(247,201,72,0.2);
    border-radius: 6px;
    padding: 3px 8px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-title-wrap { flex: 1; }
  .card-topic {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .difficulty {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }
  .diff-easy { background: rgba(78,203,141,0.12); color: var(--green); }
  .diff-medium { background: rgba(91,138,245,0.12); color: var(--accent2); }
  .diff-hard { background: rgba(224,92,122,0.12); color: var(--accent3); }

  /* Deep Dive special card */
  .problem-card.deep-dive {
    border-color: rgba(247,201,72,0.25);
    background: linear-gradient(135deg, #1a1e2a 0%, #1e1a2a 100%);
  }
  .problem-card.deep-dive .card-header {
    background: rgba(247,201,72,0.03);
  }
  .problem-card.deep-dive:hover {
    border-color: rgba(247,201,72,0.5);
    box-shadow: 0 0 30px rgba(247,201,72,0.06);
  }
  .deep-dive-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, rgba(247,201,72,0.15), rgba(224,92,122,0.15));
    border: 1px solid rgba(247,201,72,0.3);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* AI Prerequisites special card */
  .problem-card.ai-track {
    border-color: rgba(78,203,141,0.2);
    background: linear-gradient(135deg, #1a1e2a 0%, #1a2a1e 100%);
  }
  .problem-card.ai-track .card-header {
    background: rgba(78,203,141,0.03);
  }
  .problem-card.ai-track:hover {
    border-color: rgba(78,203,141,0.5);
    box-shadow: 0 0 30px rgba(78,203,141,0.06);
  }
  .ai-track-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, rgba(78,203,141,0.15), rgba(91,138,245,0.15));
    border: 1px solid rgba(78,203,141,0.3);
    color: var(--green);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Advanced Engineering card */
  .problem-card.advanced-eng {
    border-color: rgba(147,112,219,0.25);
    background: linear-gradient(135deg, #1a1e2a 0%, #1e1a2e 100%);
  }
  .problem-card.advanced-eng .card-header {
    background: rgba(147,112,219,0.03);
  }
  .problem-card.advanced-eng:hover {
    border-color: rgba(147,112,219,0.55);
    box-shadow: 0 0 35px rgba(147,112,219,0.08);
  }
  .advanced-eng-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, rgba(147,112,219,0.18), rgba(78,203,141,0.1));
    border: 1px solid rgba(147,112,219,0.35);
    color: #9370db;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Essential Gaps card */
  .problem-card.essential-gap {
    border-color: rgba(224,92,122,0.18);
    background: linear-gradient(135deg, #1a1e2a 0%, #2a1a20 100%);
  }
  .problem-card.essential-gap .card-header {
    background: rgba(224,92,122,0.03);
  }
  .problem-card.essential-gap:hover {
    border-color: rgba(224,92,122,0.45);
    box-shadow: 0 0 30px rgba(224,92,122,0.06);
  }
  .essential-gap-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, rgba(224,92,122,0.15), rgba(247,201,72,0.1));
    border: 1px solid rgba(224,92,122,0.3);
    color: var(--accent3);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Lyra Prerequisites card */
  .problem-card.lyra-prereq {
    border-color: rgba(91,138,245,0.25);
    background: linear-gradient(135deg, #1a1e2a 0%, #1a1e30 100%);
  }
  .problem-card.lyra-prereq .card-header {
    background: rgba(91,138,245,0.03);
  }
  .problem-card.lyra-prereq:hover {
    border-color: rgba(91,138,245,0.55);
    box-shadow: 0 0 30px rgba(91,138,245,0.07);
  }
  .lyra-prereq-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, rgba(91,138,245,0.15), rgba(78,203,141,0.1));
    border: 1px solid rgba(91,138,245,0.35);
    color: var(--accent2);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Lyra Secretary Capstone card */
  .problem-card.lyra-capstone {
    border-color: rgba(224,92,122,0.3);
    background: linear-gradient(135deg, #1a1e2a 0%, #2a1a1e 100%);
  }
  .problem-card.lyra-capstone .card-header {
    background: rgba(224,92,122,0.04);
  }
  .problem-card.lyra-capstone:hover {
    border-color: rgba(224,92,122,0.6);
    box-shadow: 0 0 40px rgba(224,92,122,0.08);
  }
  .lyra-capstone-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, rgba(224,92,122,0.2), rgba(247,201,72,0.15));
    border: 1px solid rgba(224,92,122,0.4);
    color: var(--accent3);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Final Plan Projects card */
  .problem-card.final-plan {
    border-color: rgba(247,201,72,0.18);
    background: linear-gradient(135deg, #1a1e2a 0%, #221e10 100%);
  }
  .problem-card.final-plan .card-header {
    background: rgba(247,201,72,0.02);
  }
  .problem-card.final-plan:hover {
    border-color: rgba(247,201,72,0.4);
    box-shadow: 0 0 30px rgba(247,201,72,0.05);
  }
  .final-plan-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, rgba(247,201,72,0.15), rgba(91,138,245,0.1));
    border: 1px solid rgba(247,201,72,0.28);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Tri-Track Bridge card — serves Lyra + Aibdaya + Neuromatch in one problem */
  .problem-card.tri-track {
    border-color: rgba(180,120,255,0.28);
    background: linear-gradient(135deg, #1a1e2a 0%, #1e1a32 50%, #1a242e 100%);
  }
  .problem-card.tri-track .card-header {
    background: linear-gradient(90deg, rgba(180,120,255,0.04), rgba(80,200,220,0.04));
  }
  .problem-card.tri-track:hover {
    border-color: rgba(180,120,255,0.6);
    box-shadow: 0 0 35px rgba(180,120,255,0.08);
  }
  .tri-track-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, rgba(180,120,255,0.2), rgba(80,200,220,0.18));
    border: 1px solid rgba(180,120,255,0.4);
    color: #c8a8ff;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* Neuromatch Prep card — math + neuroscience for NMA CompNeuro/NeuroAI */
  .problem-card.neuromatch-prep {
    border-color: rgba(80,200,220,0.25);
    background: linear-gradient(135deg, #1a1e2a 0%, #102830 100%);
  }
  .problem-card.neuromatch-prep .card-header {
    background: rgba(80,200,220,0.04);
  }
  .problem-card.neuromatch-prep:hover {
    border-color: rgba(80,200,220,0.55);
    box-shadow: 0 0 32px rgba(80,200,220,0.07);
  }
  .neuromatch-prep-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, rgba(80,200,220,0.18), rgba(78,203,141,0.12));
    border: 1px solid rgba(80,200,220,0.35);
    color: #50c8dc;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .solved-badge {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(78,203,141,0.15);
    border: 1.5px solid var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .problem-card.solved .solved-badge { opacity: 1; }

  .chevron {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .problem-card.open .chevron { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 0 24px 24px;
    border-top: 1px solid var(--border);
  }
  .problem-card.open .card-body { display: block; }

  .problem-text {
    padding: 18px 0 14px;
    line-height: 1.7;
    font-size: 0.95rem;
    color: #c8ccda;
  }
  .problem-text strong { color: var(--text); }

  .hint-box {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 10px;
    padding: 14px 18px;
    margin: 12px 0;
  }
  .hint-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hint-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #8090b0;
    line-height: 1.6;
  }

  .code-example {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin: 14px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: #8898b8;
    overflow-x: auto;
  }
  .code-example .kw { color: var(--accent2); }
  .code-example .str { color: var(--green); }
  .code-example .num { color: var(--accent); }
  .code-example .cm { color: #4a5568; font-style: italic; }
  .code-example .fn { color: var(--accent3); }

  .card-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-solve {
    background: var(--accent);
    color: #0d0f14;
  }
  .btn-solve:hover { background: #ffd96a; transform: translateY(-1px); }
  .btn-unsolve {
    background: transparent;
    color: var(--green);
    border: 1px solid rgba(78,203,141,0.3);
  }
  .btn-unsolve:hover { background: rgba(78,203,141,0.08); }
  .btn-hint {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-hint:hover { border-color: var(--accent2); color: var(--accent2); }

  .hint-reveal { display: none; margin-top: 10px; }
  .hint-reveal.visible { display: block; animation: fadeUp 0.3s ease both; }

  /* Sample output section */
  .sample-out {
    margin-top: 14px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .sample-out-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .sample-out-body {
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--green);
    line-height: 1.6;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">🐍 python bootcamp</div>
    <h1>Practice <span>Problems</span></h1>
    <p class="subtitle">77 Course · 25 Mini · 5 Deep Dives · 1 DSA · 31 AI/ML/BCI Prereqs · 5 Essential Gaps · 22 Lyra Prereqs · 8 Tri-Track Bridge · 5 Neuromatch Prep · 2 Lyra Capstone · 6 ISA Plan · 7 Advanced Eng</p>
  </header>

  <div class="progress-wrap">
    <span class="progress-label">PROGRESS</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-count" id="progressCount">0 / 0 solved</span>
  </div>

  <div class="topic-nav" id="topicNav"></div>

  <div class="problems-grid" id="problemsGrid"></div>
</div>

<script>
const problems = [
  {
    id: 1, topic: "Variables", difficulty: "easy",
    title: "Personal Info Variables",
    body: `Create variables to store your <strong>name</strong>, <strong>age</strong>, <strong>height in meters</strong>, and whether you are a <strong>student</strong> (True/False).<br><br>
    Print each variable on its own line along with a label, like:<br>
    <em>"Name: Alice"</em>, <em>"Age: 22"</em>, etc.<br><br>
    Then print out the <strong>data type</strong> of each variable using <code>type()</code>.`,
    hint: "Use type() built-in. type(42) returns <class 'int'>. Use different variable names for each piece of data.",
    sample: "Name: Alice\nAge: 22\nHeight: 1.68\nStudent: True\nTypes: <class 'str'> <class 'int'> <class 'float'> <class 'bool'>"
  },
  {
    id: 2, topic: "Type Casting", difficulty: "easy",
    title: "Type Conversion Chain",
    body: `Start with the <strong>string</strong> <code>"3.14"</code>.<br><br>
    1. Convert it to a <strong>float</strong> and print the result.<br>
    2. Convert that float to an <strong>int</strong> and print the result.<br>
    3. Convert that int to a <strong>string</strong>, then concatenate <code>" is a number"</code> to it and print.<br>
    4. Try converting the string <code>"hello"</code> to an int — wrap it in a <strong>try/except</strong> and print a friendly error message if it fails.`,
    hint: "Use int(), float(), str() for conversions. try: ... except ValueError: ... catches bad conversions.",
    sample: '3.14\n3\n"3 is a number"\nError: cannot convert "hello" to int'
  },
  {
    id: 3, topic: "User Input", difficulty: "easy",
    title: "User Profile Builder",
    body: `Ask the user for their <strong>first name</strong>, <strong>last name</strong>, and <strong>birth year</strong>.<br><br>
    Then compute their approximate <strong>age</strong> (use 2025 as the current year) and print a formatted summary like:<br><br>
    <em>"Hello, John Smith! You are approximately 30 years old."</em><br><br>
    Remember: <code>input()</code> always returns a string, so you'll need to <strong>cast</strong> the birth year.`,
    hint: "age = 2025 - int(birth_year). Combine first and last name with a space using string concatenation or f-strings.",
    sample: "Enter first name: John\nEnter last name: Smith\nEnter birth year: 1995\nHello, John Smith! You are approximately 30 years old."
  },
  {
    id: 4, topic: "Mad Libs", difficulty: "easy",
    title: "Mini Mad Lib Story",
    body: `Build a short <strong>mad lib</strong> story. Ask the user for:<br>

    title: "🔁 ICA & Advanced Artifact Rejection — Cleaning EEG Properly",
    body: `Every Spring School lecture assumes your EEG is clean. #315 only taught amplitude thresholding — that's the baseline. This covers ICA, the standard method used in every real BCI lab.<br><br>
    <strong>Spring School connection:</strong> Day 1 (Bernard Wong: High-Fidelity EEG) + Day 1 (Guger: Live EEG Acquisition Demonstration).<br><br>
    <strong>Do after:</strong> #315 Signal Processing.<br><br>
    <strong>Part 1 — Why amplitude thresholding isn't enough:</strong><br>
    EOG (eye blink) artifacts have the same frequency band as delta EEG. EMG (muscle) contaminates gamma band — which is exactly where high-gamma BCI signals live. You can't threshold them away without destroying signal.<br><br>
    <strong>Part 2 — ICA fundamentals:</strong><br>
    Independent Component Analysis separates mixed signals into statistically independent sources.<br>
    • Load a real EEG dataset with mne (use mne.datasets.sample)<br>
    • Apply ICA: <code>ica = mne.preprocessing.ICA(n_components=20); ica.fit(raw)</code><br>
    • Plot components: identify EOG components (frontal, blink-shaped)<br>
    • Auto-detect: <code>ica.find_bads_eog(raw)</code><br>
    • Remove and reconstruct: <code>ica.apply(raw)</code><br><br>
    <strong>Part 3 — Compare before/after:</strong><br>
    • Plot raw EEG vs ICA-cleaned EEG around a blink epoch<br>
    • Show PSD before/after: EOG artifact peak at <4Hz should reduce significantly<br>
    • Quantify: compute SNR improvement in alpha band (8–13Hz)<br><br>
    <strong>Part 4 — Regression-based artifact removal (alternative):</strong><br>
    For TMS-EEG (Day 4 of Spring School): ICA fails on TMS pulses. Use signal regression instead — regress out the artifact template from each channel.`,

    id: 336, topic: "AI Prerequisites", difficulty: "hard",
    title: "📊 Time-Frequency Analysis — Spectrograms, Wavelets & ERSP",
    body: `#315 taught FFT and Welch's method — static frequency analysis. This covers time-frequency analysis: how frequency content changes over time. Essential for Day 10 (High-Gamma Mapping) and Day 3 (Feature Extraction).<br><br>
    <strong>Spring School connection:</strong> Day 10 (Kai Miller: Broadband Power-Laws and Somatotopy) + Day 3 (Scherer: Feature Extraction and Classification).<br><br>
    <strong>Do after:</strong> #315, #316.<br><br>
    <strong>Part 1 — Short-Time Fourier Transform (STFT) / Spectrogram:</strong><br>
    • <code>scipy.signal.spectrogram(eeg_signal, fs=256, nperseg=128)</code><br>
    • Plot: time on x-axis, frequency on y-axis, power as color<br>
    • Observe: alpha power (10Hz) decreases during movement (Event-Related Desynchronisation)<br>
    • Window size tradeoff: large window = better frequency resolution, worse time resolution<br><br>
    <strong>Part 2 — Morlet Wavelet Transform:</strong><br>
    • Better time-frequency resolution than STFT for EEG<br>
    • <code>mne.time_frequency.tfr_morlet(epochs, freqs=np.arange(4,80,2), n_cycles=freqs/2)</code><br>
    • Plot TFR for motor imagery epochs — you should see clear ERD in mu band (8–12Hz)<br><br>
    <strong>Part 3 — ERSP (Event-Related Spectral Perturbation):</strong><br>
    • Baseline-normalised TFR: how does power change relative to a pre-stimulus baseline?<br>
    • Formula: ERSP(f,t) = 10 * log10(power(f,t) / baseline(f))<br>
    • Positive ERSP = synchronisation (ERS). Negative = desynchronisation (ERD).<br>
    • Plot grand-average ERSP across all motor imagery trials<br><br>
    <strong>Part 4 — High-gamma burst detection:</strong><br>
    • Bandpass 70–150Hz, compute Hilbert envelope<br>
    • Detect burst onset/offset using threshold crossing<br>
    • This is the core of Day 10's high-gamma mapping pipeline`,
    hint: "mne.time_frequency.tfr_morlet returns AverageTFR object. .plot() shows time-frequency map. n_cycles controls wavelet width — n_cycles=freqs/2 gives good compromise. ERSP: tfr.apply_baseline(baseline=(None, 0), mode='logratio'). High-gamma: mne.filter.filter_data(raw, 256, 70, 150) then signal.hilbert().",
    sample: "Motor imagery trial (left hand, 4 seconds):\n\nSpectrogram:\n  0–2s:  alpha (10Hz) power = 1.8 µV²/Hz  (rest)\n  2–4s:  alpha (10Hz) power = 0.6 µV²/Hz  (imagine movement)\n  ERD = -67% alpha power reduction ✓\n\nMorlet TFR (grand average, 50 trials):\n  Clear ERD at 8–12Hz (mu) from 1.5s–3.5s ✓\n  Clear ERS at 20–30Hz (beta) after 4s ✓\n  (beta rebound = movement completion)\n\nERSP at electrode C3:\n  Mu ERD:   -8.2 dB (p < 0.001)\n  Beta ERS: +4.1 dB (p < 0.001)\n\nHigh-gamma bursts detected: 23 in 10min\nMean burst duration: 180ms"

    id: 337, topic: "AI Prerequisites", difficulty: "hard",
    title: "🔗 EEG Connectivity Analysis — Coherence, PLV & Granger Causality",
    body: `Days 2 and 4 of Spring School are about brain networks — how regions communicate. This teaches the computational tools to measure that communication from EEG signals.<br><br>
    <strong>Spring School connection:</strong> Day 2 (Kapeller: High-Gamma & Cortico-Cortical Evoked Potentials) + Day 4 (Bortoletto: Effective Connectivity with TMS-EEG).<br><br>
    <strong>Do after:</strong> #315, #316.<br><br>
    <strong>Part 1 — Spectral Coherence:</strong><br>
    Coherence measures whether two channels oscillate at the same frequency at the same time.<br>
    • <code>scipy.signal.coherence(ch1, ch2, fs=256)</code><br>
    • Range: 0 (independent) to 1 (perfectly synchronised)<br>
    • Plot coherence spectrum between C3 and C4 during rest vs motor imagery<br>
    • Motor imagery should show coherence reduction in mu band between hemispheres<br><br>
    <strong>Part 2 — Phase Locking Value (PLV):</strong><br>
    PLV measures phase synchrony independent of amplitude — more robust than coherence for EEG.<br>
    • Extract instantaneous phase: <code>np.angle(scipy.signal.hilbert(filtered_signal))</code><br>
    • PLV = |mean(exp(i * phase_diff))| across trials<br>
    • Compute PLV matrix: all pairs of 64 channels → 64×64 connectivity matrix<br>
    • Plot as heatmap — identify strongly coupled channel pairs<br><br>
    <strong>Part 3 — Granger Causality:</strong><br>
    Does channel A's past predict channel B's future better than B alone? If yes, A "Granger-causes" B.<br>
    • Use <code>statsmodels.tsa.stattools.grangercausalitytests</code><br>
    • Test directional influence: motor cortex → SMA during movement preparation<br>
    • This is the basis of effective connectivity (Day 4 lectures)<br><br>
    <strong>Part 4 — Connectivity matrix visualisation:</strong><br>
    • Plot circular connectogram: nodes = electrodes, edges = PLV strength<br>
    • Threshold at PLV > 0.5 to show only strong connections<br>
    • Compare rest vs task connectivity graphs`,
    hint: "PLV: phase_diff = np.angle(signal.hilbert(ch1)) - np.angle(signal.hilbert(ch2)). PLV = np.abs(np.mean(np.exp(1j * phase_diff))). MNE connectivity: mne_connectivity.spectral_connectivity_epochs(epochs, method='plv', fmin=8, fmax=13). Granger: grangercausalitytests(np.column_stack([ch_b, ch_a]), maxlag=5).",
    sample: "Coherence C3-C4 (mu band 8–13Hz):\n  Rest:          0.71\n  Motor imagery: 0.38  (↓ 46% — interhemispheric decoupling)\n\nPLV matrix (64×64 channels):\n  Strongest connections: occipital cluster (visual)\n  Motor imagery: C3-C4 PLV drops from 0.65 → 0.31 ✓\n\nGranger causality (motor cortex → SMA):\n  F-statistic: 12.4, p = 0.0003\n  Direction confirmed: M1 leads SMA by ~80ms ✓\n  Reverse (SMA → M1): F = 1.2, p = 0.31 (not significant)\n\nConnectivity graph (PLV > 0.5):\n  Rest: 847 significant connections\n  Task: 523 significant connections\n  Motor task reduces global connectivity ✓"
  },

    id: 338, topic: "AI Prerequisites", difficulty: "hard",
    title: "📡 SSVEP BCI — Frequency-Tagging & Canonical Correlation Analysis",
    body: `SSVEP (Steady-State Visual Evoked Potential) is the third major BCI paradigm alongside P300 (#317) and Motor Imagery (#316). The hackathon (Days 6-7) explicitly lists SSVEP as one of four available paradigms — not implementing this halves your hackathon options.<br><br>
    <strong>Spring School connection:</strong> Day 6 Hackathon (paradigms: MI, P300, SSVEP, ECoG) + Day 3 (Jin: High-Performance BCIs).<br><br>
    <strong>Do after:</strong> #315, #316, #317.<br><br>
    <strong>How SSVEP works:</strong><br>
    When you stare at a flickering stimulus at frequency f Hz, your visual cortex oscillates at exactly f Hz (and harmonics 2f, 3f). Multiple stimuli flicker at different frequencies — whichever one you look at determines your "command".<br><br>
    <strong>Part 1 — Generate synthetic SSVEP:</strong><br>
    Simulate EEG with SSVEP components at 8Hz, 10Hz, 12Hz, 15Hz:<br>
    <code>signal = A * sin(2π * f * t + φ) + noise</code><br>
    Add realistic EEG background noise. Verify with FFT that peaks appear at correct frequencies.<br><br>
    <strong>Part 2 — Frequency detection with FFT:</strong><br>
    • Compute FFT of occipital channel (Oz)<br>
    • Find peak frequency in range [6–20Hz]<br>
    • Include harmonics: check 2f and 3f — sum power across fundamental + harmonics<br>
    • Signal-to-Noise Ratio: SNR(f) = power(f) / mean(power of neighbouring bins)<br><br>
    <strong>Part 3 — Canonical Correlation Analysis (CCA):</strong><br>
    CCA is the standard SSVEP decoder — more robust than FFT alone.<br>
    • For each target frequency f, build reference signals: [sin(2πft), cos(2πft), sin(4πft), cos(4πft)]<br>
    • CCA finds max correlation between multichannel EEG and reference signals<br>
    • Predicted class = frequency with highest canonical correlation<br>
    • Use <code>sklearn.cross_decomposition.CCA</code><br><br>
    <strong>Part 4 — Full offline pipeline on real data:</strong><br>
    Use the SSVEP dataset from MNE or BCI Competition — classify 4 target frequencies.<br>
    Target: >85% accuracy with CCA (state of the art is >95%).`,
    hint: "CCA: from sklearn.cross_decomposition import CCA; cca = CCA(n_components=1); cca.fit(X_eeg, X_ref); corr = np.corrcoef(cca.transform(X_eeg)[0], cca.transform(X_ref)[0])[0,1]. Build reference: t = np.arange(n_samples)/fs; ref = np.column_stack([np.sin(2*np.pi*f*t), np.cos(2*np.pi*f*t)]). Harmonics: include 2f and 3f in reference matrix.",
    sample: "Synthetic SSVEP (4 targets: 8, 10, 12, 15 Hz):\nFFT peaks confirmed at all target frequencies ✓\nHarmonics visible at 16, 20, 24, 30 Hz ✓\n\nFFT-based classifier (SNR threshold):\nAccuracy: 78.3%  (fails on low-SNR trials)\n\nCCA classifier:\nAccuracy: 91.2%  (+12.9% over FFT)\n\nPer-class accuracy:\n  8 Hz:  94.1%\n  10 Hz: 89.7%\n  12 Hz: 92.3%\n  15 Hz: 88.8%\n\nInformation Transfer Rate: 42.3 bits/min\n(State of art: ~100 bits/min with 40-target SSVEP)\n\nHackathon readiness:\n  MI (#316):    ✓ done\n  P300 (#317):  ✓ done\n  SSVEP (#338): ✓ done\n  ECoG:         use MI pipeline on ECoG data"
  },

    id: 339, topic: "AI Prerequisites", difficulty: "hard",
    title: "🔄 Transfer Learning for EEG — Cross-Subject Generalization",
    body: `#318 (EEGNet) trained and tested on the same subject. The real problem — and Day 3's entire AI panel — is generalization: can a model trained on 9 subjects work on subject 10 without retraining?<br><br>
    <strong>Spring School connection:</strong> Day 3 (Mammone: AI for BCI — Deep Learning and Generalization) + Day 3 Panel (Generalization, Ethics and the Limits of Decoding).<br><br>
    <strong>Do after:</strong> #318 EEGNet, #309 CNN PyTorch.<br><br>
    <strong>Why this matters:</strong> calibration takes 20–40 minutes per user. Paralysed patients can't calibrate for that long. Transfer learning is the path to zero-shot BCI.<br><br>
    <strong>Part 1 — The domain shift problem:</strong><br>
    • Train EEGNet on subjects 1–8, test on subject 9 (leave-one-subject-out)<br>
    • Compare: subject-specific accuracy vs cross-subject accuracy<br>
    • Quantify the domain shift — how different are EEG distributions between subjects?<br>
    • Use MMD (Maximum Mean Discrepancy) to measure distribution distance<br><br>
    <strong>Part 2 — Fine-tuning transfer learning:</strong><br>
    • Pretrain EEGNet on subjects 1–8<br>
    • Fine-tune only the classifier layer on 10 trials from subject 9<br>
    • Compare: from-scratch (full data) vs fine-tuned (10 trials) vs zero-shot<br><br>
    <strong>Part 3 — Euclidean Alignment (EA):</strong><br>
    EA is a simple, highly effective preprocessing step for cross-subject transfer.<br>
    • For each subject: compute covariance matrix R of EEG epochs<br>
    • Align: X_aligned = R^(-1/2) @ X_raw (whitening transform)<br>
    • This reduces inter-subject variability without any labels from the new subject<br>
    • Apply EA then re-run cross-subject classification — should improve significantly<br><br>
    <strong>Part 4 — Domain Adversarial Training:</strong><br>
    Add a domain discriminator that tries to identify which subject the EEG came from. Train the feature extractor to fool it — features that are subject-invariant are also transferable.`,
    hint: "Fine-tuning: freeze all layers except final Linear. optimizer = torch.optim.Adam(model.classifier.parameters(), lr=1e-4). EA: from pyriemann.utils.mean import mean_covariance; R_mean = mean_covariance(epochs); R_inv_sqrt = scipy.linalg.fractional_matrix_power(R_mean, -0.5); epochs_aligned = R_inv_sqrt @ epochs. Domain adversarial: GradientReversal layer between encoder and domain classifier.",
    sample: "Leave-One-Subject-Out evaluation (9 subjects):\n\nBaseline (no transfer):\n  Cross-subject accuracy: 54.3%  (barely above chance)\n  Subject-specific:       79.1%  (requires full calibration)\n\nFine-tuning (10 trials from target subject):\n  Accuracy: 71.8%  (+17.5% over baseline)\n  Calibration time: ~2 minutes ✓\n\nEuclidean Alignment (zero-shot):\n  Accuracy: 68.4%  (+14.1% — no labels needed!)\n  Calibration time: 0 minutes ✓\n\nEA + Fine-tuning (10 trials):\n  Accuracy: 76.2%  (close to subject-specific)\n  Calibration time: ~2 minutes ✓\n\nDomain Adversarial Training:\n  Cross-subject: 72.1%\n  Domain confusion: 51.3% (near chance — good ✓)"
  },
  {
    id: 340, topic: "AI Prerequisites", difficulty: "hard",
    title: "🎯 Interpretable ML for EEG — SHAP, Saliency Maps & Explainability",
    body: `Clinical BCI deployment requires explainability — you cannot put a black-box model on a paralysed patient without understanding what brain signals it's using. Day 9 has a dedicated lecture on this.<br><br>
    <strong>Spring School connection:</strong> Day 9 (Ossadtchi: Interpretable ML for EEG/MEG/ECoG) + Day 3 (McIntosh: Neuroethical Considerations).<br><br>
    <strong>Do after:</strong> #318 EEGNet, #308 sklearn Pipeline.<br><br>
    <strong>Part 1 — SHAP for EEG classifiers:</strong><br>
    SHAP (SHapley Additive exPlanations) assigns each feature an importance score.<br>
    • Train a gradient boosting classifier (XGBoost) on band-power features from #315<br>
    • <code>import shap; explainer = shap.TreeExplainer(model)</code><br>
    • <code>shap_values = explainer.shap_values(X_test)</code><br>
    • Plot: which frequency band + electrode combination drives the prediction most?<br>
    • Sanity check: for motor imagery, C3/C4 in mu band should have highest SHAP values<br><br>
    <strong>Part 2 — Gradient saliency for EEGNet:</strong><br>
    For deep learning models, backpropagate gradients to the input to find which timepoints matter.<br>
    • Forward pass, compute loss, backward pass: <code>loss.backward()</code><br>
    • Saliency = <code>torch.abs(input.grad)</code> — high gradient = influential timepoint<br>
    • Plot saliency map: time × channel heatmap over an EEG trial<br>
    • Motor imagery: saliency should peak in contralateral motor cortex 0.5–2s post-cue<br><br>
    <strong>Part 3 — Class Activation Mapping (CAM):</strong><br>
    Visualise which part of the EEG the CNN's final convolutional layer responds to most.<br>
    • Hook into the last conv layer of EEGNet<br>
    • Weight feature maps by the gradient of the class score<br>
    • Map back to electrode space — produces a topographic importance map<br><br>
    <strong>Part 4 — Clinician-facing report:</strong><br>
    Write a function that generates a one-page summary: predicted class, confidence, which electrodes were most influential, and which time window. This is what a real clinical BCI would show the neurologist.`,
    hint: "SHAP DeepExplainer for PyTorch: shap.DeepExplainer(model, background_data). Gradient saliency: input.requires_grad_(True); output = model(input); output[0, target_class].backward(); saliency = input.grad.abs(). CAM hook: def hook_fn(m, i, o): features.append(o). layer.register_forward_hook(hook_fn). Topographic plot: mne.viz.plot_topomap(importance_per_channel, info).",
    sample: "SHAP analysis (XGBoost on band powers, 64 channels × 5 bands):\n\nTop-5 most important features:\n  1. C3 mu-band (8–13Hz):    SHAP = 0.42 ✓ (expected)\n  2. C4 mu-band (8–13Hz):    SHAP = 0.38 ✓\n  3. Cz beta-band (13–30Hz): SHAP = 0.31 ✓\n  4. F3 theta-band (4–8Hz):  SHAP = 0.09\n  5. Oz alpha-band:           SHAP = 0.07\n\nSanity check: motor cortex electrodes dominate ✓\nModel is using neurophysiologically valid features ✓\n\nGradient saliency (EEGNet, left-hand MI trial):\nPeak saliency: C4 electrode (contralateral) ✓\nPeak time: 1.2–2.8s post-cue ✓\n\nClinician report generated:\n  Prediction: Left Hand MI (confidence: 0.91)\n  Key channels: C4, CP4, C2\n  Key window: 1.2–2.8s\n  Neurophysiology: consistent with contralateral ERD ✓"
  },
  {
    id: 341, topic: "AI Prerequisites", difficulty: "hard",
    title: "⚡ High-Gamma & Broadband Power Analysis",
    body: `Day 10 of Spring School is entirely dedicated to high-gamma activity (70–150Hz+). It also appears in Day 2 (Kapeller: High-Gamma & CCEPs). High-gamma is the primary signal in ECoG BCIs and the most information-rich EEG signal — but it's completely absent from the tracker until now.<br><br>
    <strong>Spring School connection:</strong> Day 10 (Kai Miller: Broadband Power-Laws and Somatotopy) + Day 10 (Kapeller: Real-Time High-Gamma Mapping) + Day 2 (Kapeller: High-Gamma Activity in Network Mapping).<br><br>
    <strong>Do after:</strong> #336 Time-Frequency Analysis, #316 Motor Imagery.<br><br>
    <strong>Part 1 — High-gamma band extraction:</strong><br>
    • Bandpass filter EEG/ECoG at 70–150Hz (high-gamma) using <code>scipy.signal.butter</code><br>
    • Compute Hilbert envelope: <code>np.abs(scipy.signal.hilbert(filtered))</code><br>
    • Compare: high-gamma envelope during rest vs speech vs movement<br>
    • High-gamma is broadband — power increases across 70–200Hz simultaneously (not a narrow peak)<br><br>
    <strong>Part 2 — Power-law scaling (1/f noise):</strong><br>
    EEG power spectrum follows a 1/f^β power law (pink noise). High-gamma analysis requires removing this trend.<br>
    • Fit log-log power spectrum: <code>np.polyfit(np.log(freqs), np.log(psd), 1)</code><br>
    • β exponent characterises the slope — changes with cognitive state<br>
    • Residuals after detrending = "true" narrowband power at each frequency<br>
    • High-gamma bursts stand out above the 1/f background after detrending<br><br>
    <strong>Part 3 — Somatotopic mapping (Kai Miller's approach):</strong><br>
    • Load ECoG dataset (use MNE's built-in ECoG sample or BCI Competition ECoG data)<br>
    • Compute high-gamma power per electrode during different body movements<br>
    • Plot power on a brain surface map — you should see somatotopic organisation<br>
    • Hand movement → hand area of motor cortex shows high-gamma increase ✓<br><br>
    <strong>Part 4 — High-gamma as BCI feature:</strong><br>
    Replace CSP features (#316) with high-gamma envelope features in the motor imagery classifier.<br>
    Compare accuracy: CSP+LDA vs high-gamma envelope + LDA.`,
    hint: "High-gamma filter: butter(4, [70,150], btype='bandpass', fs=1000, output='sos') — note ECoG is typically sampled at 1000Hz+. Hilbert envelope: signal.hilbert gives analytic signal; np.abs() gives amplitude envelope. Power law: slope, intercept = np.polyfit(np.log10(f[1:]), np.log10(psd[1:]), 1). Detrended PSD: psd_detrended = psd / (10**(intercept + slope * np.log10(f))).",
    sample: "ECoG dataset: 64 electrodes, 1000 Hz, motor task\n\nHigh-gamma (70–150Hz) during hand movement:\n  Electrode 23 (hand area): +340% power increase ✓\n  Electrode 45 (face area): +12% (not selective)\n  Electrode 61 (occipital): -8% (suppression)\n\nSomatotopic map: clear hand-face-foot organisation ✓\n(Matches known motor homunculus anatomy)\n\nPower-law fit:\n  Rest: β = 2.31 (typical 1/f EEG slope)\n  Task: β = 1.87 (flatter — broadband activation)\n\nBCI comparison (motor imagery, 4-class):\n  CSP + LDA:               73.4% (from #316)\n  High-gamma + LDA:        81.2% (+7.8%)\n  CSP + High-gamma + LDA:  84.6% (+11.2%)"
  },
  {
    id: 342, topic: "AI Prerequisites", difficulty: "hard",
    title: "🔴 Real-Time EEG Pipeline in Python — Streaming, Buffering & Online Decoding",
    body: `Day 5 has TWO dedicated Python pipeline sessions (Grünwald + Abiri). This is the most directly hackathon-applicable problem in the entire BCI track — without it you can analyse EEG offline but cannot build a live BCI system.<br><br>
    <strong>Spring School connection:</strong> Day 5 (Grünwald: Python for Real-Time Neuroscience) + Day 5 (Abiri & Cetera: Python-Based EEG Pipeline) + Day 5 (Reitner: Implementing Practical BCIs).<br><br>
    <strong>Do after:</strong> #315, #316, #325 Async Python.<br><br>
    <strong>The core problem:</strong> offline analysis loads all data at once. Real-time BCI processes EEG sample-by-sample or chunk-by-chunk as it arrives, with a strict latency budget.<br><br>
    <strong>Part 1 — Lab Streaming Layer (LSL):</strong><br>
    LSL is the standard protocol for real-time neuroscience data streaming.<br>
    • <code>pip install pylsl</code><br>
    • Create a mock EEG stream: <code>StreamInfo + StreamOutlet</code> pushing fake EEG data<br>
    • Receive it: <code>StreamInlet.pull_sample()</code> in a separate thread<br>
    • Measure latency: time from push to pull. Should be <5ms on localhost.<br><br>
    <strong>Part 2 — Circular buffer:</strong><br>
    Real-time processing uses a sliding window over continuously arriving data.<br>
    • Implement a <code>CircularBuffer(size=512)</code> class using a numpy array<br>
    • <code>push(new_samples)</code>: add new data, overwrite oldest<br>
    • <code>get_window()</code>: return last N samples for processing<br>
    • Thread-safe: use <code>threading.Lock</code> for push/get<br><br>
    <strong>Part 3 — Online decoding loop:</strong><br>
    • Every 250ms (epoch step): extract window → bandpass filter → CSP transform → LDA predict<br>
    • Use the CSP+LDA model you trained in #316 — just apply it to streaming windows<br>
    • Print prediction with confidence every 250ms<br>
    • Total pipeline latency target: <100ms from sample arrival to prediction output<br><br>
    <strong>Part 4 — Hackathon-ready system:</strong><br>
    Wire the online decoder to a simple output: predicted class → send UDP message → Unity/pygame receives it → cursor moves left or right. This is a complete closed-loop BCI prototype.`,
    hint: "LSL stream: info = StreamInfo('EEG', 'EEG', 64, 256, 'float32', 'eeg_mock'); outlet = StreamOutlet(info). Inlet: streams = resolve_stream('type', 'EEG'); inlet = StreamInlet(streams[0]). CircularBuffer: self.buf = np.zeros((channels, size)); self.pos = 0. push: self.buf[:, self.pos:self.pos+n] = new_data; self.pos = (self.pos+n) % self.size. Async loop: asyncio.create_task for decoder + asyncio.create_task for receiver.",
    sample: "LSL stream: 64 channels, 256 Hz, mock EEG\nStream-to-inlet latency: 2.3ms ✓ (<5ms target)\n\nCircularBuffer: 512 samples (2 seconds @ 256Hz)\nPush 32 samples: 0.08ms ✓\nGet window:      0.12ms ✓\nThread-safe: tested with 2 concurrent threads ✓\n\nOnline decoding loop (every 250ms):\n  t=0.000s: window extracted   (0.1ms)\n  t=0.001s: bandpass filtered  (1.2ms)\n  t=0.003s: CSP transformed    (0.8ms)\n  t=0.004s: LDA predicted      (0.1ms)\n  Total latency: 4.2ms ✓ (<100ms target)\n\nOnline accuracy (100 trials, left/right MI):\n  Offline CSP+LDA: 73.4%\n  Online CSP+LDA:  71.8% (-1.6% — negligible)\n\nUDP output wired to pygame cursor ✓\nComplete BCI loop working end-to-end ✓"
  },
  {
    id: 343, topic: "AI Prerequisites", difficulty: "hard",
    title: "🔄 Closed-Loop BCI — Real-Time Decode, Stimulate, Measure",
    body: `The frontier of BCI — mentioned in Day 2 (Reitner: Closed-Loop Neuromodulation), Day 8 (Guger: Closed-Loop Neurorehabilitation), and directly relevant to the hackathon. Decode brain state → deliver feedback → brain changes → decode again. The loop never stops.<br><br>
    <strong>Spring School connection:</strong> Day 2 (Reitner: Real-Time Closed-Loop Neuromodulation) + Day 8 (Guger: Closed-Loop BCI Neurorehabilitation for Stroke/MS/Parkinson).<br><br>
    <strong>Do after:</strong> #342 Real-Time Pipeline, #316 Motor Imagery.<br><br>
    <strong>What makes closed-loop different from open-loop:</strong><br>
    Open-loop: brain → decode → output (one direction)<br>
    Closed-loop: brain → decode → feedback → brain changes → decode again (cycle)<br>
    The feedback modifies the brain state, which changes the next decoding — the system adapts.<br><br>
    <strong>Part 1 — Simulated closed-loop (no hardware needed):</strong><br>
    • Simulate a "brain" that responds to feedback: if you deliver positive feedback during left-hand MI, the MI signal gets stronger (simulated neuroplasticity)<br>
    • Decoder reads state → outputs feedback signal → "brain" model updates → repeat<br>
    • Show that accuracy improves over 50 simulated trials with feedback vs without<br><br>
    <strong>Part 2 — Neurofeedback protocol:</strong><br>
    • Compute alpha power in real time (#342 pipeline)<br>
    • Display a bar that grows when alpha increases — user learns to control it<br>
    • This is exactly what g.tec's mindBEAGLE does for disorders of consciousness patients<br>
    • Run for 5 minutes, plot alpha power over time — should show upward trend<br><br>
    <strong>Part 3 — Adaptive decoder (online learning):</strong><br>

    <strong>Part 2 — Core concepts:</strong><br>
    4. <code>async def</code> defines a coroutine — calling it returns a coroutine object, not a result<br>
    5. <code>await</code> suspends the current coroutine until the awaited one finishes<br>
    6. <code>asyncio.run(main())</code> — entry point for async programs<br>
    7. <code>asyncio.gather(*coroutines)</code> — run multiple coroutines concurrently<br>
    8. <code>asyncio.sleep(n)</code> — async version of <code>time.sleep</code> (never use <code>time.sleep</code> in async code)<br><br>

    id: 607, topic: "Advanced Engineering", difficulty: "hard",
    title: "🧠 Toy Programming Language — Tokeniser, Parser, AST & Interpreter",
    body: `The most mind-expanding project on this list. Building a language means implementing every concept in CS — tokenising, parsing, tree traversal, scope, evaluation. After this, you'll understand CPython, LLVM, and every DSL you encounter.<br><br>
    <strong>Do last</strong> — this is the capstone of the Advanced Engineering track. Needs everything: OOP, recursion, data structures, pattern matching.<br><br>
    <strong>Your language (<code>lyralang</code>):</strong><br>
    <code>let x = 10<br>
    let y = x * 3 + 2<br>
    print(y)            // 32<br>
    if x > 5 { print("big") }<br>
    fn add(a, b) { a + b }<br>
    print(add(3, 4))    // 7</code><br><br>
    <strong>Implement in 4 stages:</strong><br><br>
    <strong>Stage 1 — Tokeniser (Lexer):</strong><br>
    Split source code into tokens: <code>NUMBER</code>, <code>STRING</code>, <code>IDENT</code>, <code>LET</code>, <code>IF</code>, <code>FN</code>, <code>PLUS</code>, <code>EQ</code>, <code>LPAREN</code> etc. Use regex or manual character scanning.<br><br>
    <strong>Stage 2 — Parser:</strong><br>
    Recursive descent parser. Consumes token stream, produces an AST. <code>parse_expr()</code> handles operator precedence (multiplication before addition).<br><br>
    <strong>Stage 3 — AST nodes:</strong><br>
    Dataclasses: <code>NumberLiteral</code>, <code>BinOp</code>, <code>LetStmt</code>, <code>IfStmt</code>, <code>FnDef</code>, <code>FnCall</code>, <code>Identifier</code><br><br>
    <strong>Stage 4 — Interpreter (Tree Walker):</strong><br>
    <code>eval_node(node, env)</code> — recursively evaluate AST. <code>env</code> is a dict of variable bindings. Function calls push a new scope.<br><br>
    <strong>REPL:</strong> interactive prompt that parses and evaluates one line at a time.`,
    hint: "Tokeniser: re.findall(r'\\d+\\.?\\d*|[a-zA-Z_]\\w*|[+\\-*/=(){}]|\"[^\"]*\"', source). Recursive descent: def parse_expr(): left = parse_term(); while peek() in [PLUS,MINUS]: left = BinOp(left, op, parse_term()). eval_node: match type(node).__name__: case 'BinOp': return eval(left) + eval(right). New scope: child_env = {**parent_env}.",
    sample: "lyralang> let x = 10\nlyralang> let y = x * 3 + 2\nlyralang> print(y)\n32\n\nlyralang> fn add(a, b) { a + b }\nlyralang> print(add(3, 4))\n7\n\nlyralang> if x > 5 { print(\"big\") }\nbig\n\nAST for 'x * 3 + 2':\nBinOp(\n  left=BinOp(Identifier(x), *, Number(3)),\n  op=+,\n  right=Number(2)\n)\n\nREPL running ✓  (300 lines of pure Python)"
  }
];


const topics = ["All", ...new Set(problems.map(p => p.topic))];
let activeFilter = "All";
let solved = new Set(JSON.parse(sessionStorage.getItem('solved') || '[]'));

function saveSolved() {
  sessionStorage.setItem('solved', JSON.stringify([...solved]));
}

function updateProgress() {
  const visible = getVisible();
  const solvedCount = visible.filter(p => solved.has(p.id)).length;
  const pct = visible.length ? (solvedCount / visible.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${solvedCount} / ${visible.length} solved`;
}

function getVisible() {
  return activeFilter === "All" ? problems : problems.filter(p => p.topic === activeFilter);
}

function renderTopics() {
  const nav = document.getElementById('topicNav');
  nav.innerHTML = topics.map(t =>
    `<button class="topic-btn ${t === activeFilter ? 'active' : ''}" onclick="setFilter('${t}')">${t}</button>`
  ).join('');
}

function setFilter(t) {
  activeFilter = t;
  renderTopics();
  renderProblems();
  updateProgress();
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function toggleHint(id) {
  const hint = document.getElementById('hint-' + id);
  hint.classList.toggle('visible');
}

function markSolved(id) {
  solved.add(id);
  saveSolved();
  const card = document.getElementById('card-' + id);
  card.classList.add('solved');
  const actions = card.querySelector('.card-actions');
  actions.innerHTML = `<button class="btn btn-unsolve" onclick="markUnsolved(${id})">↩ Mark Unsolved</button><button class="btn btn-hint" onclick="toggleHint(${id})">💡 Hint</button>`;
  updateProgress();
}

function markUnsolved(id) {
  solved.delete(id);
  saveSolved();
  const card = document.getElementById('card-' + id);
  card.classList.remove('solved');
  const actions = card.querySelector('.card-actions');
  actions.innerHTML = `<button class="btn btn-solve" onclick="markSolved(${id})">✓ Mark Solved</button><button class="btn btn-hint" onclick="toggleHint(${id})">💡 Hint</button>`;
  updateProgress();
}

function diffClass(d) {
  return { easy: 'diff-easy', medium: 'diff-medium', hard: 'diff-hard' }[d];
}

function renderProblems() {
  const grid = document.getElementById('problemsGrid');
  const visible = getVisible();
  if (!visible.length) {
    grid.innerHTML = '<div class="empty-state">// no problems found</div>';
    return;
  }
  grid.innerHTML = visible.map((p, i) => {
    const isDeepDive    = p.topic === "Deep Dive";
    const isAITrack     = p.topic === "AI Prerequisites";
    const isEssential   = p.topic === "Essential Gaps";
    const isLyraPrereq  = p.topic === "Lyra Prerequisites";
    const isLyraCapstone= p.topic === "Lyra Secretary";
    const isFinalPlan   = p.topic === "Final Plan Projects";
    const isAdvEng      = p.topic === "Advanced Engineering";
    const isTriTrack    = p.topic === "Tri-Track Bridge";
    const isNeuromatch  = p.topic === "Neuromatch Prep";
    const extraClass = isDeepDive ? 'deep-dive' : isAITrack ? 'ai-track' : isEssential ? 'essential-gap' : isLyraPrereq ? 'lyra-prereq' : isLyraCapstone ? 'lyra-capstone' : isFinalPlan ? 'final-plan' : isAdvEng ? 'advanced-eng' : isTriTrack ? 'tri-track' : isNeuromatch ? 'neuromatch-prep' : '';
    const badge = isDeepDive
      ? ' &nbsp;<span class="deep-dive-badge">⚡ deep dive</span>'
      : isAITrack
        ? ' &nbsp;<span class="ai-track-badge">🤖 ai/ml/bci</span>'
        : isEssential
          ? ' &nbsp;<span class="essential-gap-badge">⚠️ essential gap</span>'
          : isLyraPrereq
            ? ' &nbsp;<span class="lyra-prereq-badge">🔩 lyra prereq</span>'
            : isLyraCapstone
              ? ' &nbsp;<span class="lyra-capstone-badge">🧠 lyra capstone</span>'
              : isFinalPlan
                ? ' &nbsp;<span class="final-plan-badge">📋 isa plan</span>'
                : isAdvEng
                  ? ' &nbsp;<span class="advanced-eng-badge">🚀 advanced</span>'
                  : isTriTrack
                    ? ' &nbsp;<span class="tri-track-badge">🎯 tri-track</span>'
                    : isNeuromatch
                      ? ' &nbsp;<span class="neuromatch-prep-badge">🧬 neuromatch</span>'
                      : '';
    return `
    <div class="problem-card ${solved.has(p.id) ? 'solved' : ''} ${extraClass}" id="card-${p.id}" style="animation-delay:${i*0.06}s">
      <div class="card-header" onclick="toggleCard(${p.id})">
        <span class="problem-num">#${String(p.id).padStart(3,'0')}</span>
        <div class="card-title-wrap">
          <div class="card-topic">${p.topic}${badge}</div>
          <div class="card-title">${p.title}</div>
        </div>
        <div class="card-meta">
          <span class="difficulty ${diffClass(p.difficulty)}">${p.difficulty}</span>
          <div class="solved-badge">✓</div>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="card-body">
        <div class="problem-text">${p.body}</div>
        <div class="sample-out">
          <div class="sample-out-header">Expected Output (example)</div>
          <div class="sample-out-body">${p.sample.replace(/\n/g,'<br>')}</div>
        </div>
        <div class="card-actions">
          ${solved.has(p.id)
            ? `<button class="btn btn-unsolve" onclick="markUnsolved(${p.id})">↩ Mark Unsolved</button>`
            : `<button class="btn btn-solve" onclick="markSolved(${p.id})">✓ Mark Solved</button>`
          }
          <button class="btn btn-hint" onclick="toggleHint(${p.id})">💡 Hint</button>
        </div>
        <div class="hint-reveal" id="hint-${p.id}">
          <div class="hint-box">
            <div class="hint-label">Hint</div>
            <div class="hint-text">${p.hint}</div>
          </div>
        </div>
      </div>
    </div>
  `}).join('');
}

renderTopics();
renderProblems();
updateProgress();
</script>
</body>
</html>
